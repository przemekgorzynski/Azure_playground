name: Bicep CI

on:
  pull_request:
    paths:
      - "Bicep/**/*.bicep"
      - ".github/workflows/bicep-ci.yml"
  push:
    branches: [ main ]

jobs:
  bicep:
    name: Bicep Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ---- Install Bicep CLI ----
      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/

      # ---- Bicep Syntax Check ----
      - name: Check Bicep Syntax
        run: |
          for f in $(find Bicep -name "*.bicep"); do
            echo "Checking $f"
            bicep build "$f" --stdout
          done

      # ---- Convert Bicep to ARM JSON ----
      - name: Build Bicep to ARM JSON
        run: |
          mkdir -p arm_json
          for f in $(find Bicep -name "*.bicep"); do
            bicep build "$f" --outdir arm_json
          done

      # ---- Checkov Scan on ARM JSON ----
      - name: Run Checkov on Bicep/ARM
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: arm_json
          framework: arm
          quiet: true
          soft_fail: false
